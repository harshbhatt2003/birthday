  <main class="message-page">

    <section class="letter reveal">
      <p class="eyebrow">Chapter three</p>
      <h1>For You, My Baccha❤️</h1>
      <p class="typed-letter" data-typed-text="My love, today is about celebrating you: your kindness, your laugh, your light, and the way you make life feel softer just by being in it. I hope this little surprise reminds you that you are loved deeply, chosen every day, and cherished more than words can hold. Happy birthday, beautiful."></p>
      <button class="primary-btn glow-btn" type="button" data-next="final.html">One Last Surprise</button>
    </section>
