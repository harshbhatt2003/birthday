<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Surprise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="final">
  <button class="music-toggle" type="button" aria-label="Toggle music" data-music-toggle>
    <span data-music-icon>♪</span>
  </button>

  <main class="final-page">
    <div class="balloon-field" data-balloons aria-hidden="true"></div>
    <section class="final-moment reveal">
      <p class="pre-final">You are & will be the most beautiful part of my life ❤️</p>
      <div class="countdown" data-countdown>5</div>
      <h1 class="final-title" data-final-title>Happy Birthday Shalini🎉</h1>
      <p class="final-note">May your year be as gentle, bright, and unforgettable as you are.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="../js/script.js"></script>

</html>
